# 商城自动化测试 - Docker Compose
version: '3.8'

services:
  # 自动化测试服务
  autotest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mall-autotest
    environment:
      - TEST_ENV=test
      - TZ=Asia/Shanghai
    volumes:
      - ./reports:/app/reports
      - ./logs:/app/logs
    networks:
      - autotest-network
    depends_on:
      - mysql
      - redis
    restart: unless-stopped

  # MySQL测试数据库
  mysql:
    image: mysql:8.0
    container_name: mall-test-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: mall_admin_test
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - autotest-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis测试缓存
  redis:
    image: redis:7-alpine
    container_name: mall-test-redis
    ports:
      - "6379:6379"
    networks:
      - autotest-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx用于下载测试报告
  nginx:
    image: nginx:alpine
    container_name: mall-test-nginx
    ports:
      - "8080:80"
    volumes:
      - ./reports/html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - autotest-network
    depends_on:
      - autotest

networks:
  autotest-network:
    driver: bridge

volumes:
  mysql-data:

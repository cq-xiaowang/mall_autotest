# 商城后台管理系统测试环境配置

# 基础URL配置
base_url: "http://dev-mall-admin.example.com"
api_prefix: "/api/v1"

# 数据库配置
database:
  host: "localhost"
  port: 3306
  user: "root"
  password: "root123"
  database: "mall_admin_dev"
  charset: "utf8mb4"

# Redis配置
redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

# 测试账号
test_account:
  admin:
    username: "admin"
    password: "admin123"
  user:
    username: "testuser"
    password: "test123"

# 超时配置
timeout:
  request: 10
  page_load: 30

# 阿里云OSS配置（报告存储）
oss:
  enabled: false  # 改为true启用OSS上传
  access_key_id: "your_access_key_id"
  access_key_secret: "your_access_key_secret"
  bucket_name: "mall-test-reports"
  endpoint: "oss-cn-hangzhou.aliyuncs.com"
  region: "oss-cn-hangzhou"
  base_path: "test-reports"

# Nginx服务器配置（持久化存储）
nginx:
  enabled: false  # 改为true启用Nginx上传
  host: "your-nginx-server.com"
  port: 22
  user: "deploy"
  password: "your_password"
  upload_path: "/var/www/html/reports"
  download_url: "http://your-nginx-server.com/reports"
